openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Little Village Restaurant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: menu
    description: Menu management
  - name: orders
    description: Order management
  - name: reservations
    description: Reservation management
  - name: admin
    description: Admin operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /menu:
    get:
      operationId: getMenuItems
      tags: [menu]
      summary: Get all menu items
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: restaurantId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"
    post:
      operationId: createMenuItem
      tags: [menu]
      summary: Create a menu item (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMenuItemRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          description: Unauthorized

  /menu/{id}:
    put:
      operationId: updateMenuItem
      tags: [menu]
      summary: Update a menu item (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMenuItemRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteMenuItem
      tags: [menu]
      summary: Delete a menu item (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /orders:
    get:
      operationId: getOrders
      tags: [orders]
      summary: Get all orders (admin)
      parameters:
        - name: restaurantId
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    put:
      operationId: updateOrderStatus
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderStatusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /reservations:
    get:
      operationId: getReservations
      tags: [reservations]
      summary: Get all reservations (admin)
      parameters:
        - name: restaurantId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
    post:
      operationId: createReservation
      tags: [reservations]
      summary: Create a reservation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /reservations/{id}:
    put:
      operationId: updateReservationStatus
      tags: [reservations]
      summary: Update reservation status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReservationStatusRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Invalid credentials

  /admin/me:
    get:
      operationId: getAdminMe
      tags: [admin]
      summary: Get current admin session
      responses:
        "200":
          description: Admin session info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSession"
        "401":
          description: Not authenticated

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stats:
    get:
      operationId: getStats
      tags: [admin]
      summary: Get dashboard stats (admin)
      parameters:
        - name: restaurantId
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    MenuItem:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        isAvailable:
          type: boolean
        isFeatured:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - restaurantId
        - name
        - price
        - category
        - isAvailable
        - isFeatured
        - createdAt

    CreateMenuItemRequest:
      type: object
      properties:
        restaurantId:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        isAvailable:
          type: boolean
        isFeatured:
          type: boolean
      required:
        - restaurantId
        - name
        - price
        - category

    UpdateMenuItemRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        imageUrl:
          type: string
        isAvailable:
          type: boolean
        isFeatured:
          type: boolean

    Order:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        customerAddress:
          type: string
        items:
          type: string
        totalAmount:
          type: number
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - restaurantId
        - customerName
        - customerPhone
        - customerAddress
        - items
        - totalAmount
        - status
        - createdAt

    CreateOrderRequest:
      type: object
      properties:
        restaurantId:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        customerAddress:
          type: string
        items:
          type: string
        totalAmount:
          type: number
      required:
        - restaurantId
        - customerName
        - customerPhone
        - customerAddress
        - items
        - totalAmount

    UpdateOrderStatusRequest:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Reservation:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        date:
          type: string
        time:
          type: string
        guests:
          type: integer
        status:
          type: string
        notes:
          type: string
        createdAt:
          type: string
      required:
        - id
        - restaurantId
        - customerName
        - customerPhone
        - date
        - time
        - guests
        - status
        - createdAt

    CreateReservationRequest:
      type: object
      properties:
        restaurantId:
          type: string
        customerName:
          type: string
        customerPhone:
          type: string
        date:
          type: string
        time:
          type: string
        guests:
          type: integer
        notes:
          type: string
      required:
        - restaurantId
        - customerName
        - customerPhone
        - date
        - time
        - guests

    UpdateReservationStatusRequest:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AdminLoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AdminLoginResponse:
      type: object
      properties:
        success:
          type: boolean
        restaurantId:
          type: string
        email:
          type: string
      required:
        - success
        - restaurantId
        - email

    AdminSession:
      type: object
      properties:
        authenticated:
          type: boolean
        restaurantId:
          type: string
        email:
          type: string
      required:
        - authenticated

    DashboardStats:
      type: object
      properties:
        totalOrders:
          type: integer
        totalReservations:
          type: integer
        pendingOrders:
          type: integer
        todayReservations:
          type: integer
        revenueEstimate:
          type: number
        popularItems:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
            required:
              - name
              - count
      required:
        - totalOrders
        - totalReservations
        - pendingOrders
        - todayReservations
        - revenueEstimate
        - popularItems
